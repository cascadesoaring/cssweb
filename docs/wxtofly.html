<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }

      #windgram {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <a href="http://wxtofly.net/v2/explorer.html#Chelan" target="_blank" rel="noopener noreferrer">
      <img id="windgram" alt="Chelan windgram">
    </a>

    <script>
      const today = new Date();
      const yyyy = today.getUTCFullYear();
      const mm = String(today.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(today.getUTCDate()).padStart(2, '0');
      const rand = Math.floor(Math.random() * 1e8);

      const imageName = `${yyyy}-${mm}-${dd}_Chelan_windgram.png`;
      const wxtoflyChelan = `http://wxtofly.net/windgrams/${imageName}?${rand}`;
      const windgramUrl = `https://images.weserv.nl/?url=${encodeURIComponent(wxtoflyChelan)}`;

      document.getElementById('windgram').src = windgramUrl;
      document.getElementById('windgram').alt += " " + imageName;
    </script>
  </body>
</html>
