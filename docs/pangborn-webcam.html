<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }

      #keatcam {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <a href="https://cam.pangbornairport.com/webcam/pawebcam.jpg" target="_blank" rel="noopener noreferrer">
      <img id="keatcam" alt="Pangborn Airport webcam">
    </a>

    <script>
      const rand = Math.floor(Math.random() * 1e8);
      document.getElementById('keatcam').src = `https://cam.pangbornairport.com/webcam/pawebcam.jpg?${rand}`;
    </script>
  </body>
</html>
